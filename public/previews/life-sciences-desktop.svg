<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="100%" height="100%" fill="#f5f6f7" />

  <!-- Header -->
  <g font-family="Inter, Arial, sans-serif" fill="#2b3338">
    <text x="40" y="72" font-size="20" fill="#1f6f61">01</text>
    <text x="100" y="72" font-size="20" font-weight="600">Life sciences intelligence</text>
    <text x="1280" y="72" font-size="14" fill="#6b7276">View project ↗</text>
  </g>

  <!-- Short description -->
  <text x="40" y="112" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4b5560">A secure workspace for turning scattered market, therapy, and research data into usable intelligence.</text>

  <!-- Mock device card -->
  <g transform="translate(40,150)">
    <rect x="0" y="0" width="1520" height="520" rx="16" fill="#ffffff" stroke="#e6e9ec" />

    <!-- Inner panel -->
    <g transform="translate(28,28)">
      <rect x="0" y="0" width="1464" height="432" rx="12" fill="#f3f5f6" stroke="#e9ecef" />

      <!-- Title area -->
      <text x="24" y="40" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8b96a0">INTELLIGENCE WORKSPACE</text>
      <text x="24" y="74" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#2b3338">Reusable intelligence view</text>

      <!-- Right badge -->
      <rect x="1200" y="24" width="140" height="36" rx="18" fill="#ffffff" stroke="#dfe6ea"/>
      <text x="1268" y="48" font-size="12" fill="#57606a">Approved sources</text>

      <!-- Content cards -->
      <g transform="translate(24,110)">
        <rect x="0" y="0" width="520" height="160" rx="12" fill="#ffffff" stroke="#e6e9ec" />
        <text x="24" y="40" font-size="28" font-weight="700" fill="#1f2933">82%</text>
        <text x="24" y="72" font-size="12" fill="#6b7276">Coverage</text>
        <text x="24" y="96" font-size="12" fill="#9aa4ad">indexed</text>

        <rect x="560" y="0" width="520" height="160" rx="12" fill="#ffffff" stroke="#e6e9ec" />
        <text x="584" y="40" font-size="28" font-weight="700" fill="#1f2933">14</text>
        <text x="584" y="72" font-size="12" fill="#6b7276">Alerts</text>
        <text x="584" y="96" font-size="12" fill="#9aa4ad">reviewed</text>
      </g>

      <!-- Footer lines -->
      <rect x="24" y="300" width="1400" height="8" rx="4" fill="#e9edf0" opacity="0.6" />
    </g>
  </g>
</svg>